{{ template "header" . }}
<div class="grid gap-4">
	<div class="flex items-center justify-between">
		<h1 class="text-xl font-semibold">Requests</h1>
	</div>
	<div id="req-table"
		 class="bg-night-800 rounded-xl2 shadow-card ring-1 ring-white/10 p-2"
		 hx-get="/ui/requests/table"
		 hx-trigger="load, refresh, request:created from:body, request:updated from:body"
		 hx-swap="innerHTML">
		<div class="p-4 text-slate-400">Loading...</div>
		{{/* Initial server render as a fallback; will be replaced by HTMX */}}
		{{ template "requests_table" . }}
	</div>
</div>

<script>
var requestsRefreshTimer = null;
var requestsRefreshDelayMs = 15000;
window.requestCoverCache = window.requestCoverCache || {};
window.requestCoverPromises = window.requestCoverPromises || {};

document.addEventListener('DOMContentLoaded', function() {
	formatRequestAuthors();
	loadRequestCovers();
	scheduleRequestRefresh();
});

document.addEventListener('htmx:afterSwap', function(evt) {
	if (evt.detail.target && evt.detail.target.id === 'req-table') {
		formatRequestAuthors();
		loadRequestCovers();
		scheduleRequestRefresh();
	}
});

document.addEventListener('htmx:beforeRequest', function(evt) {
	if (evt.detail.elt && evt.detail.elt.id === 'req-table' && requestsRefreshTimer) {
		clearTimeout(requestsRefreshTimer);
		requestsRefreshTimer = null;
	}
});

window.addEventListener('pagehide', function() {
	if (requestsRefreshTimer) {
		clearTimeout(requestsRefreshTimer);
		requestsRefreshTimer = null;
	}
});

function applyRequestCover(img, cover) {
	if (!img) return;
	if (cover) img.src = cover;
	img.dataset.coverLoaded = 'true';
}

function requestCoverKey(bookData) {
	return [
		(bookData.format || '').trim().toLowerCase(),
		(bookData.isbn13 || '').trim(),
		(bookData.isbn10 || '').trim(),
		(bookData.asin || '').trim(),
		(bookData.title || '').trim().toLowerCase()
	].filter(Boolean).join('|');
}

function listRequestStatusCards() {
	return Array.from(document.querySelectorAll('#req-table [data-request-status]'));
}

function requestNeedsAutoRefresh(element) {
	var status = (element.getAttribute('data-request-status') || '').toLowerCase();
	var external = (element.getAttribute('data-external-status') || '').toLowerCase();
	if (external === 'available' || external === 'monitored' || external === 'grabbed') return false;
	return status === 'pending' || status === 'processing' || status === 'approved' || status === 'queued';
}

function scheduleRequestRefresh() {
	if (requestsRefreshTimer) {
		clearTimeout(requestsRefreshTimer);
		requestsRefreshTimer = null;
	}
	if (!listRequestStatusCards().some(requestNeedsAutoRefresh)) return;
	requestsRefreshTimer = setTimeout(function() {
		refreshRequestsTable();
	}, requestsRefreshDelayMs);
}

function refreshRequestsTable() {
	var reqTable = document.getElementById('req-table');
	if (!reqTable) return;
	if (window.htmx) {
		htmx.trigger(reqTable, 'refresh');
		return;
	}
	fetch('/ui/requests/table', { credentials: 'same-origin' })
		.then(function(resp) { return resp.text(); })
		.then(function(html) {
			reqTable.innerHTML = html;
			formatRequestAuthors();
			loadRequestCovers();
			scheduleRequestRefresh();
		});
}

function loadRequestCovers() {
	var coverImages = document.querySelectorAll('#req-table [data-request-cover]');
	coverImages.forEach(function(img) {
		if (img.dataset.coverLoaded === 'true') return;
		var clickable = img.closest('[data-open-book]');
		if (!clickable) {
			img.dataset.coverLoaded = 'true';
			return;
		}
		var jsonData = clickable.getAttribute('data-open-book');
		if (!jsonData) {
			img.dataset.coverLoaded = 'true';
			return;
		}
		try {
			var bookData = JSON.parse(jsonData);
			if (!bookData || typeof bookData !== 'object') {
				img.dataset.coverLoaded = 'true';
				return;
			}
			if (bookData.cover) {
				applyRequestCover(img, bookData.cover);
				return;
			}
			var key = requestCoverKey(bookData);
			if (!key) {
				img.dataset.coverLoaded = 'true';
				return;
			}
			if (window.requestCoverCache[key]) {
				applyRequestCover(img, window.requestCoverCache[key]);
				return;
			}
			if (!window.requestCoverPromises[key]) {
				window.requestCoverPromises[key] = fetchRequestCover(bookData).then(function(cover) {
					if (cover) window.requestCoverCache[key] = cover;
					return cover;
				}).catch(function() {
					return '';
				});
			}
			window.requestCoverPromises[key].then(function(cover) {
				applyRequestCover(img, cover);
			});
		} catch(e) {
			img.dataset.coverLoaded = 'true';
		}
	});
}

function requestCoverFromEndpoint(path, bookData) {
	return fetch(path, {
		method: 'POST',
		headers: {
			'Content-Type': 'application/json',
			'HX-Request': 'true'
		},
		body: JSON.stringify(bookData),
		credentials: 'same-origin'
	})
	.then(function(resp) {
		if (!resp.ok) return null;
		return resp.json();
	})
	.then(function(data) {
		if (data && typeof data.cover === 'string' && data.cover.trim()) {
			return data.cover;
		}
		return '';
	});
}

function fetchRequestCover(bookData) {
	return requestCoverFromEndpoint('/api/v1/book/details', bookData).then(function(cover) {
		if (cover) return cover;
		return requestCoverFromEndpoint('/api/v1/book/enriched', bookData);
	});
}

function formatRequestAuthors() {
	var tableRows = document.querySelectorAll('#req-table table tbody tr');
	tableRows.forEach(function(row) {
		var authorElement = row.querySelector('.text-slate-400');
		if (authorElement && authorElement.textContent.trim()) {
			var originalAuthor = authorElement.textContent.trim();
			if (originalAuthor && typeof window.formatAuthorName === 'function') {
				var formattedAuthor = window.formatAuthorName(originalAuthor);
				authorElement.textContent = formattedAuthor;

				var clickableElement = row.querySelector('[data-open-book]');
				if (clickableElement) {
					try {
						var bookData = JSON.parse(clickableElement.getAttribute('data-open-book'));
						if (bookData.authors && bookData.authors.length > 0) {
							bookData.authors[0] = formattedAuthor;
							clickableElement.setAttribute('data-open-book', JSON.stringify(bookData));
						}
					} catch(e) {
					}
				}
			}
		}
	});

	var mobileCards = document.querySelectorAll('#req-table .grid.gap-3 > div');
	mobileCards.forEach(function(card) {
		var authorElement = card.querySelector('.text-sm.text-slate-400');
		if (authorElement && authorElement.textContent.trim()) {
			var originalAuthor = authorElement.textContent.trim();
			if (originalAuthor && typeof window.formatAuthorName === 'function') {
				var formattedAuthor = window.formatAuthorName(originalAuthor);
				authorElement.textContent = formattedAuthor;

				var clickableElement = card.querySelector('[data-open-book]');
				if (clickableElement) {
					try {
						var bookData = JSON.parse(clickableElement.getAttribute('data-open-book'));
						if (bookData.authors && bookData.authors.length > 0) {
							bookData.authors[0] = formattedAuthor;
							clickableElement.setAttribute('data-open-book', JSON.stringify(bookData));
						}
					} catch(e) {
					}
				}
			}
		}
	});
}
</script>

{{ template "footer" . }}
