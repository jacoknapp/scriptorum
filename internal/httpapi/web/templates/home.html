{{ template "header" . }}
<div class="rounded-xl2 shadow-card ring-1 ring-white/10 overflow-hidden" style="background:linear-gradient(135deg, rgba(124,58,237,.22), rgba(17,17,26,.98) 42%, rgba(11,11,19,1));">
	<div class="p-6 md:py-8">
		<div class="max-w-3xl">
			<div class="text-xs uppercase tracking-wide text-royal-300">Search books</div>
			<h1 id="searchTagline" class="mt-3 text-2xl font-semibold text-slate-100">Your next bad bedtime decision</h1>
			<p class="mt-2 text-sm text-slate-300">Search by title, author, ISBN, or browse the shelves while the box is empty.</p>
		</div>

		<form id="searchForm" class="mt-6 flex flex-col sm:flex-row gap-2">
			<input name="q" class="flex-1 border border-white/10 bg-night-900 text-slate-100 placeholder-slate-400 rounded px-3 py-3 min-w-0"
				   placeholder="Title / Author / ISBN / ASIN / paste Amazon URL"
				   id="searchInput"
				   autocomplete="off">
			<input type="hidden" name="page" value="1">
			<input type="hidden" name="limit" value="20">
			<button class="px-4 py-3 rounded bg-royal-600 hover:bg-royal-500 text-white">Search</button>
		</form>
		<div id="searchIndicator" class="mt-3 rounded-xl border px-4 py-3 text-sm text-slate-100" style="display: none; background: rgba(91, 33, 182, .18); border-color: rgba(139, 92, 246, .28);">
			Searching for matches...
		</div>
	</div>
</div>
<div id="results"
	 class="mt-4"
	 hx-get="/ui/search"
	 hx-trigger="load"
	 hx-swap="innerHTML">
	<div class="bg-night-800 rounded-xl2 shadow-card ring-1 ring-white/10 p-6 text-slate-400">
		Loading discovery shelves...
	</div>
</div>
<div id="more" class="md:block"
		 style="display: none;"
		 hx-get="/ui/search"
		 hx-trigger="revealed"
		 hx-target="#results"
		 hx-swap="beforeend"
		 hx-vals='js:(function(){
			 const f=document.getElementById("searchForm");
			 if(!f) return {};
			 const data=new FormData(f);
			 const page=parseInt(data.get("page")||"1");
			 data.set("page", String(page+1));
			 const obj=Object.fromEntries(data.entries());
			 f.querySelector("input[name=page]").value=String(page+1);
			 return obj;
		 })()'>
</div>

function setRandomSearchTagline() {
	var searchTagline = document.getElementById('searchTagline');
	if (!searchTagline || SEARCH_TAGLINES.length === 0) {
		return;
	}

	var index;
	if (window.crypto && typeof window.crypto.getRandomValues === 'function') {
		var values = new Uint32Array(1);
		window.crypto.getRandomValues(values);
		index = values[0] % SEARCH_TAGLINES.length;
	} else {
		index = Math.floor(Math.random() * SEARCH_TAGLINES.length);
	}

	searchTagline.textContent = SEARCH_TAGLINES[index];
}

document.addEventListener('DOMContentLoaded', function() {
	setRandomSearchTagline();

	var searchInput = document.getElementById('searchInput');
	var searchForm = document.getElementById('searchForm');

	if (!searchInput) {
		return;
	}

	if (!searchForm) {
		return;
	}

	var initSearch = function() {
		if (typeof window.debouncedSearch !== 'function') {
			setTimeout(initSearch, 100);
			return;
		}

		searchInput.addEventListener('input', function(e) {
			window.debouncedSearch(e.target.value);
		});

		searchForm.addEventListener('submit', function(e) {
			e.preventDefault();
			window.debouncedSearch(searchInput.value, 0);
		});

		searchInput.focus();
		if (searchInput.value.trim().length >= 2) {
			window.debouncedSearch(searchInput.value, 0);
		}
	};

	initSearch();
});
</script>
